name: tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install package (editable, with dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short

      - name: Report coverage (best-effort, non-blocking)
        if: matrix.os == 'ubuntu-latest'
        continue-on-error: true
        run: |
          pip install coverage pytest-cov
          python -m pytest tests/ --cov=src/harness --cov-report=term-missing 2>&1 | tail -25
