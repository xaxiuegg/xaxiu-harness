  # ---- WARM (W9-MUTATION-CANARY rotation; 3-mutant spot-check per session) ----
  - path: src/harness/proxy/circuit.py
    tier: warm
    last_sweep_sha: e81cbdb
    last_sweep_date: "2026-05-24"
    expected_kill_rate: 1.0  # canary uses pytest -x, so 1 kill = success
    notes: "W9-MUTATION-CANARY first run: 2/2 mutations killed; gt_to_ge skipped (pattern absent)."

  - path: src/harness/observer/cycle.py
